<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <style>
    html, body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0px;
        height:100%;
        width: 100%;
    }

    .navbar {
        overflow: hidden;
        background-color: #333;
        top: 0;
        width: 100%;
    }

    .navbar p {
        float: left;
        display: block;
        color: #f2f2f2;
        text-align: center;
        padding: 14px 16px;
        margin: 0;
        text-decoration: none;
    }
   
    .navbar a {
        float: left;
        display: block;
        color: #f2f2f2;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
    }

    .navbar a:hover {
        background: #ddd;
        color: black;
    }
    .navbar a.active {
        background-color: #4646ff;
        color: white;
    }
    #logo a {
        padding: 3px 16px;
    }
    #logo a:hover {
        background: #333;
    }
    #logo img {
        width: 36px;
        height: 36px;
    }
    </style>
</head>
<body>
    <div class="navbar">
        <div id="logo"><a href="home.html" target="container-main"><img src="favicon.ico" alt="Logomarca de viagem"></a></div>
        <a href="home.html" class="active" target="container-main">Início</a>
        <a href="menu-vertical-historias.html" target="menu-vertical">Histórias Tec</a>
      </div>
</body>
</html>
